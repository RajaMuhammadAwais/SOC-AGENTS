apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-frontend
  namespace: enterprise-ai-soc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soc-frontend
  template:
    metadata:
      labels:
        app: soc-frontend
    spec:
      containers:
        - name: frontend
          image: enterprise-ai-soc-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: soc-frontend
  namespace: enterprise-ai-soc
spec:
  selector:
    app: soc-frontend
  ports:
    - port: 3000
      targetPort: 3000
